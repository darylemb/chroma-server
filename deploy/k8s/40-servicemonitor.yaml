# Optional: ServiceMonitor for Prometheus Operator (kube-prometheus-stack).
# Remove if you don't use the operator.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chroma-server
  namespace: chroma
  labels:
    app: chroma-server
spec:
  selector:
    matchLabels:
      app: chroma-server
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
