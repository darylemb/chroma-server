apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma-server
  namespace: chroma
  labels:
    app: chroma-server
spec:
  replicas: 1
  strategy:
    type: Recreate   # single replica, avoids races on the embedded DB
  selector:
    matchLabels:
      app: chroma-server
  template:
    metadata:
      labels:
        app: chroma-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: chroma
          image: chroma-server:1.0.0
          imagePullPolicy: Never   # local-only image built with buildah
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CHROMA_PATH
              value: /data
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: "8000"
            # chromadb downloads the ONNX embedding model to $HOME/.cache
            # by default. As UID 1000, $HOME defaults to "/" and we can't
            # write there. Redirect to a writable path inside the data PVC.
            - name: HOME
              value: /data
            - name: XDG_CACHE_HOME
              value: /data/.cache
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chroma-data
