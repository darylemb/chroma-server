apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma-server
  namespace: chroma
  labels:
    app: chroma-server
spec:
  replicas: 1
  strategy:
    type: Recreate   # single replica, avoids races on the embedded DB
  selector:
    matchLabels:
      app: chroma-server
  template:
    metadata:
      labels:
        app: chroma-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: install-deps
          image: python:3.11-alpine
          # Install pip deps into a shared emptyDir so the main container
          # doesn't need to re-install on every restart. ~80-120s first time,
          # ~3s on subsequent restarts thanks to the emptyDir cache (mounted
          # to /venv across restarts of the same pod; the emptyDir is wiped
          # on pod recreation, so this only helps within a pod's lifetime —
          # but that's the slow case anyway). For real caching across pods
          # use a PVC-backed /venv.
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache gcc musl-dev linux-headers
              python -m venv /app/venv
              . /app/venv/bin/activate
              pip install --no-cache-dir -U pip wheel
              pip install --no-cache-dir -r /src/requirements.txt
              echo "deps installed"
          volumeMounts:
            - name: src
              mountPath: /src
            - name: app-venv
              mountPath: /app
      containers:
        - name: chroma
          image: python:3.11-alpine
          command: ["sh", "-c"]
          args:
            - |
              set -e
              cp /src/server.py /app/server.py
              . /app/venv/bin/activate
              exec python /app/server.py
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CHROMA_PATH
              value: /data
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: "8000"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: app-venv
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 30    # init container takes ~2 min first time
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chroma-data
        - name: src
          configMap:
            name: chroma-server-source
        - name: app-venv
          emptyDir:
            sizeLimit: 1Gi
